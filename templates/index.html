<!-- prettier-ignore -->
{%extends "base.html"%} {% block breadcrumb %} {% endblock %} 
{% block content %}
<div class="services mt-3 mb-5">
  {% for service in services %}
  <a
    href="{% url service.url %}"
    class="service text-decoration-none text-dark p-3"
  >
    <div
      class="card-body d-flex flex-column align-items-center justify-content-center text-center p-0"
    >
    <img src="{{ service.image.url }}" class="service-card-img mb-3" alt="{{ service.section }}" />
      <div class="heading-wrapper mb-2">
        <h5 class="mb-1"><b>{{ service.section }}</b></h5>
      </div>
      <!-- <p class="service-description mb-0">{{ service.service_provided }}</p> -->
    </div>
  </a>
  {% endfor %}
</div>

<!-- Out of Hours Modal -->
<!-- prettier-ignore -->
{% endblock %} {% block scripts %}

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const openingHour = {{ opening_hour }};
    const closingHour = {{ closing_hour }};
    const serviceLinks = document.querySelectorAll('a.service');

    console.log(openingHour)

    serviceLinks.forEach(function (link) {
      const href = link.getAttribute('href');
      console.log(href)

      if (href === 'equipment_library' || href === '/equipment_library/') {
        link.addEventListener('click', function (e) {
          const now = new Date();
          const hour = now.getHours();

          if (hour < openingHour || hour >= closingHour) {
            e.preventDefault();
            console.log('Navigation blocked: outside allowed hours');

            const modalElement = document.getElementById('outOfHoursModal');
            if (modalElement && typeof bootstrap !== 'undefined' && bootstrap.Modal) {
              const modal = new bootstrap.Modal(modalElement);
              modal.show();
            } else {
              console.error('Modal element or Bootstrap.Modal not available');
            }
          }
        });
      }
    });
  });
</script>
{% endblock %}
