{% load crispy_forms_tags %}

<div class="modal-header">
  <h5 class="modal-title">Edit: {{ object.category_name }}</h5>
  <button
    type="button"
    class="btn-close"
    data-bs-dismiss="modal"
    aria-label="Close"
  ></button>
</div>

<form
  id="categoryForm"
  method="post"
  enctype="multipart/form-data"
  hx-post="{{ request.path }}"
  hx-target="#categoryModalContent"
  hx-swap="innerHTML"
  hx-encoding="multipart/form-data"
>
  <div class="modal-body">
    {% csrf_token %}

    <div class="mb-3">
      <label class="form-label" for="{{ form.category_id.id_for_label }}">
        {{ form.category_id.label }}
      </label>
      {{ form.category_id }}
    </div>

    <div class="mb-3">
      <label class="form-label" for="{{ form.category_name.id_for_label }}">
        {{ form.category_name.label }}
      </label>
      {{ form.category_name }}
    </div>

    <div class="mb-3">
      <label class="form-label" for="{{ form.display_name.id_for_label }}">
        {{ form.display_name.label }}
      </label>
      {{ form.display_name }}
    </div>

    <div class="row g-3 mt-2">
      <div class="col-12 col-md-6">
        <div class="form-check form-switch">
          {{ form.is_active }}
          <label
            class="form-check-label"
            for="{{ form.is_active.id_for_label }}"
          >
            {{ form.is_active.label }}
          </label>
        </div>
      </div>

      <div class="col-12 col-md-6">
        <div class="form-check form-switch">
          {{ form.is_permanent_loan }}
          <label
            class="form-check-label"
            for="{{ form.is_permanent_loan.id_for_label }}"
          >
            {{ form.is_permanent_loan.label }}
          </label>
        </div>
      </div>
    </div>

    <div class="mt-3">
      <label class="form-label" for="{{ form.image.id_for_label }}">
        {{ form.image.label }}
      </label>
      {{ form.image }}
    </div>
  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
      Close
    </button>
    <button type="submit" class="btn btn-primary">Save</button>
  </div>
</form>
