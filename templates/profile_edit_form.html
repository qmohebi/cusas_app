{% load crispy_forms_tags %}

<form
  method="post"
  hx-post="{% url 'cusas_app:profile_edit' object.pk %}"
  hx-target="#profile-row-{{ object.pk }}"
  hx-swap="outerHTML"
>
  {% csrf_token %}
  {{ form|crispy }}

  <div class="mt-3">
    <button type="submit" class="btn btn-success">Save</button>
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
      Cancel
    </button>
  </div>
</form>

<script>
  // Re-initialize Select2 when the form is injected into modal
  $(".select2").select2({
    dropdownParent: $("#profileModal")
  });
</script>
